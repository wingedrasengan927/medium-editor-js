name: Auto Release

on:
  push:
    tags:
      - 'v*' # Runs whenever you push a tag like v1.0.0

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm run build
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**
