<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>medium-editor-js</title>

		<script>
			window.MathJax = {
				tex: {
					inlineMath: [
						["$", "$"],
						["\\(", "\\)"],
					],
					displayMath: [
						["$$", "$$"],
						["\\[", "\\]"],
					],
				},
				output: {
					displayOverflow: "linebreak",
					linebreaks: {
						inline: true,
						width: "100%",
						lineleading: 0.6
					},
				},
				startup: {
					typeset: false,
				},
			};
		</script>
		<script
			type="text/javascript"
			id="MathJax-script"
			async
			src="https://cdn.jsdelivr.net/npm/mathjax@4.1.2/tex-mml-chtml.js"
		></script>
	</head>
	<body>
		<div id="app">
			<nav class="navbar">
				<div class="navbar-links">
					<a
						class="navbar-btn"
						href="https://github.com/wingedrasengan927/medium-editor-js"
						target="_blank"
						>GitHub</a
					>
				</div>
				<div class="action-grp">
					<button class="navbar-btn" id="copy-html-btn">
						Copy HTML
					</button>
					<button class="navbar-btn" id="copy-markdown-btn">
						Copy Markdown
					</button>
					<button class="navbar-btn" id="paste-markdown-btn">
						Paste Markdown
					</button>
					<button class="navbar-btn" id="copy-json-btn">
						Copy JSON
					</button>
				</div>
			</nav>
			<div class="editor-wrapper">
				<div id="lexical-editor" contenteditable="true"></div>
			</div>
		</div>
		<!-- 
		  Re-render math equations on resize
		-->
		<script>
			let resizeTimeout;
			window.addEventListener("resize", () => {
				clearTimeout(resizeTimeout);
				resizeTimeout = setTimeout(() => {
					if (window.MathJax && MathJax.startup && MathJax.startup.document) {
						MathJax.startup.document.state(100);
						MathJax.startup.document.render();
					}
				}, 200); // 200ms debounce to prevent layout thrashing
			});
		</script>
		<script type="module" src="/src/main.js"></script>
	</body>
</html>
